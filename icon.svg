<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64C8FF"/>
      <stop offset="100%" style="stop-color:#9664FF"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="100%" style="stop-color:#FF8E53"/>
    </linearGradient>
    <linearGradient id="ring3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#44CF6C"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.05)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.15)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Background with glass effect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="256" rx="112" fill="url(#glass)" opacity="0.3"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="512" y2="512" stroke="white" stroke-width="1"/>
    <line x1="512" y1="0" x2="0" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Outer ring shadow -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="26" stroke-linecap="round" filter="url(#innerShadow)"/>
  <!-- Outer ring track -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="24" stroke-linecap="round"/>
  <!-- Outer ring progress -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring1)" stroke-width="24" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="848" stroke-dashoffset="212" transform="rotate(-90 256 256)"/>
  
  <!-- Middle ring shadow -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="26" stroke-linecap="round" filter="url(#innerShadow)"/>
  <!-- Middle ring track -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="24" stroke-linecap="round"/>
  <!-- Middle ring progress -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#ring2)" stroke-width="24" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="880" stroke-dashoffset="352" transform="rotate(-90 256 256)"/>
  
  <!-- Inner ring shadow -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="26" stroke-linecap="round" filter="url(#innerShadow)"/>
  <!-- Inner ring track -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="24" stroke-linecap="round"/>
  <!-- Inner ring progress -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="url(#ring3)" stroke-width="24" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="628" stroke-dashoffset="314" transform="rotate(-90 256 256)"/>
  
  <!-- Center glow -->
  <circle cx="256" cy="256" r="50" fill="url(#ring1)" opacity="0.2"/>
  <circle cx="256" cy="256" r="20" fill="white" opacity="0.1"/>
  
  <!-- Glass highlight -->
  <ellipse cx="256" cy="180" rx="160" ry="80" fill="white" opacity="0.05"/>
</svg>
